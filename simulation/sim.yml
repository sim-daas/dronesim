# Simulation container tmuxinator config
# Starts Gazebo + 4 PX4 SITL instances + XRCE-DDS Agent + Camera bridges
name: sim
root: /root

windows:
  - Micro_XRCE_Agent:
      root: /root/Micro-XRCE-DDS-Agent
      layout: even-vertical
      panes:
        - MicroXRCEAgent udp4 -p 8888

  - PX4_1:
      root: /root/PX4-Autopilot
      layout: even-vertical
      panes:
        - PX4_SYS_AUTOSTART=4002 PX4_GZ_MODEL_POSE="0.0,0.0,1.0,0.00,0,-0.7" PX4_SIM_MODEL=gz_x500_mono_cam_down ./build/px4_sitl_default/bin/px4

  - PX4_2:
      root: /root/PX4-Autopilot
      layout: even-vertical
      panes:
        - PX4_GZ_STANDALONE=1 PX4_SYS_AUTOSTART=4002 PX4_GZ_MODEL_POSE="2.0,1.0,1.0,0.00,0,-0.7" PX4_SIM_MODEL=gz_x500 ./build/px4_sitl_default/bin/px4 -i 1

  - PX4_3:
      root: /root/PX4-Autopilot
      layout: even-vertical
      panes:
        - PX4_GZ_STANDALONE=1 PX4_SYS_AUTOSTART=4002 PX4_GZ_MODEL_POSE="-2.0,1.0,1.0,0.00,0,-0.7" PX4_SIM_MODEL=gz_x500 ./build/px4_sitl_default/bin/px4 -i 2

  - PX4_4:
      root: /root/PX4-Autopilot
      layout: even-vertical
      panes:
        - PX4_GZ_STANDALONE=1 PX4_SYS_AUTOSTART=4002 PX4_GZ_MODEL_POSE="0.0,3.0,1.0,0.00,0,-0.7" PX4_SIM_MODEL=gz_x500 ./build/px4_sitl_default/bin/px4 -i 3

  - Camera_Bridge:
      root: /root
      layout: even-vertical
      panes:
        - sleep 6 && ros2 run ros_gz_image image_bridge /camera
